name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
      
    - name: Publish
      run: dotnet publish --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --output ./publish
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: ./publish
        retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Run tests
      run: dotnet test --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx"
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'
        retention-days: 30

  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4.1.3
      with:
        name: backend-build
        path: ./publish
        
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts
        
    - name: Deploy to server
      env:
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_SERVER_IP: ${{ secrets.DEPLOY_SERVER_IP }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        # Create deployment directory if it doesn't exist
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER_IP} "mkdir -p ${DEPLOY_PATH}/backup ${DEPLOY_PATH}/app"
        
        # Backup current deployment
        ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} "if [ -d ${DEPLOY_PATH}/app ]; then cp -r ${DEPLOY_PATH}/app ${DEPLOY_PATH}/backup/app-\$(date +%Y%m%d-%H%M%S); fi"
        
        # Copy new files to server
        rsync -avz -e "ssh -i ~/.ssh/deploy_key" ./publish/ ${DEPLOY_USER}@${DEPLOY_SERVER_IP}:${DEPLOY_PATH}/app/
        
        # Restart the application service
        ssh -i ~/.ssh/deploy_key ${DEPLOY_USER}@${DEPLOY_SERVER_IP} "sudo systemctl restart sai-deal-assistant-backend && sudo systemctl is-active sai-deal-assistant-backend"
        
    - name: Cleanup SSH key
      if: always()
      run: rm -f ~/.ssh/deploy_key
