name: Deploy to Dev Server

on:
  pull_request:
    types: [closed]
    branches:
      - dev

permissions:
  contents: read

jobs:
  deploy-dev:
    # Only run if PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Sai.DealAssistant.sln

      - name: Build
        run: |
          dotnet build src/Sai.DealAssistant.sln \
            --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test src/Sai.DealAssistant.sln \
            --no-build --configuration Release --verbosity normal

      - name: Build Docker image
        run: |
          cd src
          docker build -t sai-deal-assistant:dev -f Sai.DealAssistant.WebApi/Dockerfile .

      - name: Save Docker image
        run: |
          docker save sai-deal-assistant:dev -o sai-deal-assistant-dev.tar

      - name: Deploy to Dev Server
        env:
          DEV_SERVER_HOST: 192.168.1.245
          DEV_SERVER_PORT: 2222
          DEV_SERVER_USER: sai
          DEV_SERVER_PASSWORD: ${{ secrets.DEV_SERVER_PASSWORD }}
        run: |
          # Install sshpass for password authentication
          sudo apt-get update
          sudo apt-get install -y sshpass

          # Copy Docker image to server
          echo "Copying Docker image to dev server..."
          sshpass -p "$DEV_SERVER_PASSWORD" scp -P $DEV_SERVER_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            sai-deal-assistant-dev.tar \
            $DEV_SERVER_USER@$DEV_SERVER_HOST:/tmp/

          # Copy deployment script to server
          echo "Copying deployment script to dev server..."
          sshpass -p "$DEV_SERVER_PASSWORD" scp -P $DEV_SERVER_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            deploy-dev.sh \
            $DEV_SERVER_USER@$DEV_SERVER_HOST:/tmp/

          # Execute deployment script on server
          echo "Executing deployment on dev server..."
          sshpass -p "$DEV_SERVER_PASSWORD" ssh -p $DEV_SERVER_PORT \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            $DEV_SERVER_USER@$DEV_SERVER_HOST \
            "chmod +x /tmp/deploy-dev.sh && /tmp/deploy-dev.sh"

      - name: Deployment Summary
        run: |
          echo "✅ Deployment to dev server completed successfully!"
          echo "🌐 Application should be available at: http://192.168.1.245:5000"
          echo "📦 Container name: sai-deal-assistant-dev"
          echo "🔄 Environment: Production (with dev database)"
